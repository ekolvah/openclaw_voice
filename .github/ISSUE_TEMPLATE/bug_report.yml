name: Bug report
description: Record a reproducible defect with evidence and acceptance criteria.
title: "bug: "
labels: ["type:bug", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: current_behavior
    attributes:
      label: Current behavior
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Say ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs and evidence
      description: Include relevant excerpts from voice_bridge.log or realtimesst.log.
    validations:
      required: true
  - type: textarea
    id: hypothesis
    attributes:
      label: Root cause hypothesis
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks
